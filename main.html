<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>



<!-- NavBar -->

<nav class="flex flex-col md:flex-row md:items-center md:justify-between p-3 bg-gray-100 shadow gap-3">

    <!-- Left Nav -->
    <div class="flex items-center gap-2">
        <img class="w-6 h-6" src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="GitHub Logo" />
        <h2 class="text-lg md:text-xl font-semibold">GitHub Issues Tracer</h2>
    </div>

    <!-- Right Nav (Search Box) -->
    <div class="flex w-full md:w-auto gap-2">
        <input id="searchInput" type="text" placeholder="Search issues..."
            class="input input-bordered input-sm w-full md:w-64 rounded" />

        <button id="searchBtn" class="btn btn-sm btn-primary rounded">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span class="hidden md:inline">Search</span>
        </button>
    </div>

</nav>


<!-- Buttons -->
<div class=" rounded w-10/12 shadow-sm flex justify-start  gap-2 p-4 mx-auto mt-10">
    <button id="allBtn" class="btn btn-primary btn-sm w-[80px] ">All</button>
    <button id="openBtn" class="btn btn-sm btn-soft w-[80px]">Open</button>
    <button id="closedBtn" class="btn btn-sm btn-soft w-[80px]">Close</button>
</div>




<!-- Issues Section -->
<div class=" w-10/12 shadow-sm mx-auto">


    <!-- Issues Title Box -->

    <div class="flex flex-col md:flex-row md:justify-between gap-4 shadow-sm p-5 rounded-box">

        <div class="flex gap-2 items-center">
            <img class="w-12 md:w-15" src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt="">

            <div>
                <h3 class="text-xl md:text-2xl font-bold">
                    <span id="issues-count" class="font-bold">50</span> Issues
                </h3>
                <p class="text-gray-400 text-sm md:text-base">
                    Track and manage your project issues
                </p>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <span class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-success"></i>
                <p>Open</p>
            </span>

            <span class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-[#a855f7]"></i>
                <p>Closed</p>
            </span>
        </div>

    </div>

    <!-- issues Container -->
    <div id="issuesContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8 mt-5 shadow-2xl rounded-box">

        <!-- Card Div-->

        <!-- loading Spinner -->

            <span class="loading loading-bars loading-xs"></span>
            <span class="loading loading-bars loading-sm"></span>
            <span class="loading loading-bars loading-md"></span>
            <span class="loading loading-bars loading-lg"></span>
            <span class="loading loading-bars loading-xl"></span>
        </div>
    </div>
</div>

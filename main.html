<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>



<!-- NavBar -->

<nav class="flex items-center justify-between p-2 bg-gray-100 shadow">

    <!-- Left Nav -->
    <div class="flex items-center px-3">
        <img class="w-6 h-6" src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="GitHub Logo" />

        <h2 class="text-lg font-semibold m-5">GitHub Issues Tracer</h2>

    </div>

    <!-- Right Nav (Search Box) -->
    <div class="flex gap-3 py-3 px-3">
        <input id="searchInput" type="text" placeholder="Search issues..."
            class="input input-bordered btn-sm w-64 rounded" />
        <button id="searchBtn" class="btn btn-sm btn-primary rounded"><i class="fa-solid fa-magnifying-glass"></i>Search
        </button>
    </div>

</nav>


<!-- Buttons -->
<div class=" rounded w-10/12 shadow-sm flex justify-start  gap-2 p-4 mx-auto mt-10">
    <button id="allBtn" class="btn btn-primary btn-sm w-[80px] ">All</button>
    <button id="openBtn" class="btn btn-sm btn-soft w-[80px]">Open</button>
    <button id="closedBtn" class="btn btn-sm btn-soft w-[80px]">Close</button>
</div>




<!-- Issues Section -->
<div class=" w-10/12 shadow-sm mx-auto">
    <!-- Issues Title Box -->
 

    <div class=" flex  lg:justify-between shadow-sm p-5 rounded-box">
               <div class="flex gap-2">
                 <img class="w-15 max-w-15" src=".//B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt="">
                <div>
                    <h3 class="text-2xl font-bold"><span id="issues-count" class="font-bold">50</span> Issues</h3>
                    <p class="text-gray-400">Track and manage your project issues</p>
                </div>
               </div>
              
               <div class=" flex gap-4 items-center ">
                <span class="flex items-center gap-2"><i class="fa-solid fa-circle text-success"></i><p>Open</p></span>
                <span class="flex items-center gap-2"><i class="fa-solid fa-circle text-[#a855f7]"></i><p>Closed</p></span>
               </div>
            </div>

    <!-- issues Container -->
    <div id=" issuesContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8 mt-5 shadow-2xl rounded-box">

        <!-- Card Div-->
        <div
            class="card border-t-5 border-green-500 bg-base-100 shadow-sm p-5 space-y-3 h-auto cursor-pointer hover:shadow-md transition">
            <div class="flex justify-between">
                <img src="./B13-A5-Github-Issue-Tracker/assets/Open-Status.png" alt="open status">
                <div class="badge badge-soft badge-error">HIGH</div>
            </div>
            <h3 class="text-xl font-bold line-clamp-2">Implement real-time notifications</h3>
            <p class="line-clamp-2 text-gray-400">Add WebSocket support for real-time notifications when issues are
                updated or commented on.</p>
            <div class="flex gap-3 mt-3 flex-wrap">
                <div class="badge badge-soft badge-success">
                    <span class="mr-1"><i class="fa-solid fa-wand-magic-sparkles"></i></span>ENHANCEMENT
                </div>
            </div>
            <hr>
            <p>alex_perf</p>
            <p>1/23/2024</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Tailwind & Daisy Ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Css File Connected -->
    <link rel="stylesheet" href="./style.css">

</head>


<body>

   

    <!-- Login Form -->
    <main class="flex flex-col items-center justify-center min-h-screen bg-gray-100">

        <img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="">
        <h2 class="  text-black font-bold text-2xl py-2"> GitHub Issues Tracker</h2>
        <p class="  text-gray-400 mb-2">Sign in to manage your issues</p>
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4  ">
            <!-- <legend class="fieldset-legend">Login</legend> -->

            <label  class="label">Username</label>
            <input id="username" type="email" class="input" placeholder="Enter Username" />
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label">Password</label>
            <input  id="password" type="password" class="input" placeholder="Enter Password" />
            <p class="text-[#4A00FF]">Default: admin123</p>


            <button id="loginBtn" class="btn bg-[#1A77F2] text-white border-[#005fd8]">Sing in</button>

            <div class="flex items-center my-4">
                <hr class="flex-grow border-t-2 border-gray-300">
                <span class="mx-2 text-gray-500">OR</span>
                <hr class="flex-grow border-t-2 border-gray-300">
            </div>
            <div class="flex flex-col items-center justify-center  bg-gray-100">
                <p class="  text-gray-400 mb-2">Demo Credentials:</p>
                <div class="text-center bg-blue-100 py-6 px-20">
                    <p>Username: admin</p>
                    <p>Password: admin123</p>
                </div>
            </div>



        </fieldset>
    </main>




    <!-- Js File Connected -->
    <script src="./script.js"></script>
</body>

</html>
